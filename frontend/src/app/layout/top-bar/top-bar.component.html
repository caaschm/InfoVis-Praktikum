<header class="top-bar">
    <div class="container">
        <div class="left">
            <h1 class="app-title">{{ appTitle }}</h1>
            <button class="goBack-btn" (click)="goBack()" [disabled]="!canUndo" aria-label="goBack">
                ↩ Back
            </button>
        </div>

        <!-- Workflow Tracker -->
        <div class="workflow-tracker-container">
            <app-workflow-tracker (navigateToTab)="onWorkflowNavigate($event)"
                (executeAction)="onWorkflowAction($event)">
            </app-workflow-tracker>
        </div>

        <div class="actions">
            <input type="file" #fileInput (change)="onFileSelected($event)" accept=".txt,.pdf" style="display: none;"
                aria-label="Upload file">

            <button class="upload-btn" (click)="fileInput.click()" aria-label="Upload file">
                📁 Upload
            </button>

            <div class="settings-container">
                <button class="settings-btn" (click)="onSettingsClick()" aria-label="Settings">
                    ⚙️ Settings
                </button>

                <div class="dropdown-menu" *ngIf="showSettingsDropdown">
                    <div class="dropdown-header">Accessibility</div>
                    <div class="dropdown-item">
                        <span>Color Corrected: Deuteranomaly</span>
                        <label class="switch">
                            <input type="checkbox" [checked]="isColorBlindMode" (change)="toggleColorBlindMode()">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="dropdown-item">
                        <span>Line Highlighting</span>
                        <label class="switch">
                            <input type="checkbox" [checked]="isZebraMode" (change)="toggleZebraMode()">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="dropdown-item">
                        <span>Large Font Size</span>
                        <label class="switch">
                            <input type="checkbox" [checked]="isLargeFont" (change)="toggleLargeFont()">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
