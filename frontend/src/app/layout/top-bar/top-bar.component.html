<header class="top-bar">
    <div class="container">
        <div class="left">
            <h1 class="app-title">{{ appTitle }}</h1>
            <button class="goBack-btn" (click)="goBack()" [disabled]="!canUndo" aria-label="goBack">
                ↩ Back
            </button>
        </div>

        <div class="actions">
            <input type="file" #fileInput (change)="onFileSelected($event)" accept=".txt,.pdf" style="display: none;"
                aria-label="Upload file">
            
            <button class="upload-btn" (click)="fileInput.click()" aria-label="Upload file">
                📁 Upload
            </button>

            <div class="settings-container">
                <button class="settings-btn" (click)="onSettingsClick()" aria-label="Settings">
                    ⚙️ Settings
                </button>

                <div class="dropdown-menu" *ngIf="showSettingsDropdown">
                    <div class="dropdown-header">Einstellungen</div>
                    <div class="dropdown-item">
                        <span>Rot-Grün-Schwäche</span>
                        <label class="switch">
                            <input type="checkbox" 
                                   [checked]="isColorBlindMode" 
                                   (change)="toggleColorBlindMode()">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="dropdown-item">Profil</div>
                </div>
            </div> </div> </div> </header>
