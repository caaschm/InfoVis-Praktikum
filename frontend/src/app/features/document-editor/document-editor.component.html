<div class="document-editor" *ngIf="currentDocument">
    <div class="main-content" [class.sidebar-hidden]="!sidebarVisible">
        <!-- Text editor / Workspace -->
        <div class="workspace-panel">
            <app-text-viewer></app-text-viewer>
        </div>

        <!-- Right side: Multipurpose panel -->
        <div class="right-panel" *ngIf="sidebarVisible">
            <app-sidebar [activeTab]="activeTab" (switchTab)="onSwitchTab($event)"></app-sidebar>
        </div>

        <!-- Vertical tab buttons strip (far right) -->
        <div class="tab-strip">
            <button class="tab-btn" [class.active]="sidebarVisible && activeTab === 'ai'" (click)="toggleTab('ai')"
                (dblclick)="hideSidebar()" title="AI Generation (Double-click to hide)">
                <span class="icon">🤖</span>
            </button>
            <button class="tab-btn" [class.active]="sidebarVisible && activeTab === 'emojis'"
                (click)="toggleTab('emojis')" (dblclick)="hideSidebar()" title="Emojis (Double-click to hide)">
                <span class="icon">😀</span>
            </button>
            <button class="tab-btn" [class.active]="sidebarVisible && activeTab === 'characters'"
                (click)="toggleTab('characters')" (dblclick)="hideSidebar()" title="Characters (Double-click to hide)">
                <span class="icon">🎭</span>
            </button>
            <button class="tab-btn" [class.active]="sidebarVisible && activeTab === 'analysis'"
                (click)="toggleTab('analysis')" (dblclick)="hideSidebar()"
                title="Sentiment Analysis (Double-click to hide)">
                <span class="icon">🕸️</span>
            </button>
            <button class="tab-btn" [class.active]="sidebarVisible && activeTab === 'storyarc'"
                (click)="toggleTab('storyarc')" (dblclick)="hideSidebar()" title="Story Arc (Double-click to hide)">
                <span class="icon">📈</span>
            </button>
            <button class="tab-btn" [class.active]="sidebarVisible && activeTab === 'toc'" (click)="toggleTab('toc')"
                (dblclick)="hideSidebar()" title="Chapter Overview (Double-click to hide)">
                <span class="icon">📊</span>
            </button>
        </div>
    </div>
</div>

<div class="no-document" *ngIf="!currentDocument">
    <p>Loading document...</p>
</div>
