<div class="emoji-set-manager">
    <div class="manager-header">
        <h3>Custom Emoji Sets</h3>
        <p class="description">Curate your own emoji collections for quick access</p>
        <button class="btn-add" (click)="toggleAddForm()" [class.active]="showAddForm">
            {{ showAddForm ? '✕ Cancel' : '+ Create Set' }}
        </button>
    </div>

    <!-- Add set form -->
    <div class="add-form" *ngIf="showAddForm">
        <div class="form-group">
            <label>Set Name *</label>
            <input type="text" [(ngModel)]="newName" placeholder="e.g., Character Emotions, Fantasy Elements"
                class="text-input" />
        </div>

        <div class="form-group">
            <label>Select Emojis ({{ selectedEmojis.length }} selected)</label>

            <!-- Category tabs -->
            <div class="category-tabs">
                <button *ngFor="let category of getCategoryKeys()" class="category-tab"
                    [class.active]="activeCategory === category" (click)="selectCategory(category)">
                    {{ category }}
                </button>
            </div>

            <!-- Emoji picker by category -->
            <div class="emoji-picker-grid">
                <button *ngFor="let emoji of emojiCategories[activeCategory]" class="emoji-btn"
                    [class.selected]="isEmojiSelected(emoji)" (click)="toggleEmoji(emoji)">
                    {{ emoji }}
                </button>
            </div>

            <!-- Selected emojis preview -->
            <div class="selected-preview" *ngIf="selectedEmojis.length > 0">
                <p class="preview-label">Selected:</p>
                <div class="selected-emojis">
                    <span *ngFor="let emoji of selectedEmojis" class="selected-emoji">
                        {{ emoji }}
                    </span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" [(ngModel)]="setAsDefault" />
                <span>Set as default (quick access in emoji panel)</span>
            </label>
        </div>

        <button class="btn-create" (click)="addEmojiSet()" [disabled]="!newName.trim() || selectedEmojis.length === 0">
            Create Emoji Set
        </button>
    </div>

    <!-- Emoji sets list -->
    <div class="sets-list" *ngIf="emojiSets.length > 0">
        <div *ngFor="let set of emojiSets" class="set-card" [class.default]="set.isDefault">
            <div class="set-header">
                <h4>
                    {{ set.name }}
                    <span class="default-badge" *ngIf="set.isDefault">★ Default</span>
                </h4>
                <div class="set-actions">
                    <button *ngIf="!set.isDefault" class="btn-set-default" (click)="setAsDefaultSet(set)"
                        title="Set as default">
                        ★
                    </button>
                    <button class="btn-delete" (click)="deleteEmojiSet(set)" title="Delete set">
                        🗑️
                    </button>
                </div>
            </div>

            <div class="set-emojis">
                <span *ngFor="let emoji of set.emojis" class="emoji-item">
                    {{ emoji }}
                </span>
            </div>

            <p class="set-info">{{ set.emojis.length }} emojis</p>
        </div>
    </div>

    <div class="empty-state" *ngIf="emojiSets.length === 0 && !showAddForm">
        <p>No custom emoji sets yet.</p>
        <p class="hint">Create sets to organize emojis by theme or purpose.</p>
    </div>
</div>
